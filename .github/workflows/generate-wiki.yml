name: Generate Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/generate-wiki.yml'
  workflow_dispatch:

jobs:
  generate-wiki:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout wiki repository
        uses: actions/checkout@v7
        with:
          repository: codinglombok/LombokCSS.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate wiki pages
        run: |
          # Home page = docs/index.html
          if [ -f docs/index.html ]; then
            cp docs/index.html wiki/Home.html
          fi

          # Getting Started
          if [ -f docs/getting-started.html ]; then
            cp docs/getting-started.html wiki/Getting-Started.html
          fi

          # Accessibility
          if [ -f docs/accessibility.html ]; then
            cp docs/accessibility.html wiki/Accessibility.html
          fi

          # Components
          if [ -f docs/components.html ]; then
            cp docs/components.html wiki/Components.html
          fi

          # Forms
          if [ -f docs/forms.html ]; then
            cp docs/forms.html wiki/Forms.html
          fi

          # Theming
          if [ -f docs/theming.html ]; then
            cp docs/theming.html wiki/Theming.html
          fi

          # Utilities
          if [ -f docs/utilities.html ]; then
            cp docs/utilities.html wiki/Utilities.html
          fi

          # Migration Guide
          if [ -f docs/migration.html ]; then
            cp docs/migration.html wiki/Migration-Guide.html
          fi

          # Copy assets (images, css, etc. referenced by the HTML pages)
          if [ -d docs/assets ]; then
            mkdir -p wiki/assets
            cp -r docs/assets/. wiki/assets/
          fi

      - name: Create _Sidebar.md
        run: |
          cat > wiki/_Sidebar.md << 'EOF'
          # Documentation

          - [[Home|Home]]
          - [[Getting Started|Getting-Started]]
          - [[Components|Components]]
          - [[Forms|Forms]]
          - [[Theming|Theming]]
          - [[Utilities|Utilities]]
          - [[Accessibility|Accessibility]]
          - [[Migration Guide|Migration-Guide]]
          EOF

      - name: Create _Footer.md
        run: |
          cat > wiki/_Footer.md << 'EOF'
          ---
          *LombokCSS v0.1.0 - Zero-Dependency CSS Library*

          [Repository](https://github.com/codinglombok/LombokCSS) | [npm Package](https://www.npmjs.com/package/lombok-css) | [License](https://github.com/codinglombok/LombokCSS/blob/main/LICENSE)
          EOF

      - name: Commit and push wiki changes
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-generate wiki from repository documentation"
            git push origin master
            echo "Wiki updated successfully"
          fi