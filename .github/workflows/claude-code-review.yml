name: Claude Code Review (LombokCSS)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths:
      - "src/**"
      - "dist/**"
      - "*.js"
      - "*.css"
      - "package.json"

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing a PR for LombokCSS (codinglombok/LombokCSS),
            a standalone CSS framework distributed via jsDelivr CDN
            (dist/lombok.min.css + dist/lombok.js). so backward
            compatibility is critical.

            Review the diff with focus on:

            1. **Design token integrity** — all colors, spacing, radii,
               and typography must go through the `--lc-*` CSS custom
               properties in src/variables.css. Flag any hard-coded hex
               values, px spacing, or new tokens that don't follow the
               `--lc-` naming convention. Renaming or removing an existing
               `--lc-*` token is a BREAKING change — flag it loudly.
            2. **Backward compatibility** — existing class names and their
               visual behavior must not change silently. Removed/renamed
               classes, changed default styles, or altered specificity
               that could break downstream pages (theming via token
               override must keep working).
            3. **dist/ consistency** — if src/ changed but dist/ did not
               (or vice versa), flag it: dist must be rebuilt from src,
               never hand-edited. Check that lombok.min.css and lombok.js
               changes correspond to src changes.
            4. **lombok.js behaviors** — vanilla JS only, no framework
               dependencies. Check for: global namespace pollution beyond
               the LombokCSS API, event listeners without cleanup, DOM
               queries that assume markup not guaranteed by the docs,
               and defer-safe initialization (script loads with `defer`).
            5. **CSS quality** — selector specificity creep, `!important`
               usage, missing vendor-neutral fallbacks, RTL/logical
               property concerns, dark-mode token coverage if applicable.
            6. **Accessibility** — focus states, contrast of default
               token values, reduced-motion handling for transitions,
               ARIA expectations in interactive components (drawer,
               tabs, modal).
            7. **Bundle size** — flag additions that meaningfully grow
               lombok.min.css; suggest consolidation where possible.

            Post inline comments only on genuine issues. End with a short
            summary: ✅ approve, or ⚠️ blocking items, plus a note on
            whether the change is semver patch / minor / MAJOR.
          claude_args: |
            --max-turns 15
