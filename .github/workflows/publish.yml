name: Publish to npm (manual fallback)

# Automated publishing happens in release-please.yml when a release is created.
# This workflow is a manual escape hatch (e.g. to re-publish a fixed tarball).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
