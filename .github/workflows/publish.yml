name: Publish to npm (manual fallback)

# Automated publishing happens in release-please.yml when a release is created.
# This workflow is a manual escape hatch (e.g. to re-publish a fixed tarball).
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for npm provenance

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to npm (skip if version already exists)
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "lombokcss@$VER" version >/dev/null 2>&1; then
            echo "lombokcss@$VER already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
