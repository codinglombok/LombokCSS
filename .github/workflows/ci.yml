name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build bundle
        run: npm run build
      - name: Verify size budget
        run: npm run size:check
      - name: Ensure dist is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git diff --stat dist
            exit 1
          fi
