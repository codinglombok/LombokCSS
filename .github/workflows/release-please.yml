name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # for npm provenance on the publish step

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Publish to npm only when this run created a release ---
      # Done here (not in a separate release-triggered workflow) because events
      # created by GITHUB_TOKEN do not trigger other workflows.
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - if: ${{ steps.release.outputs.release_created }}
        run: npm ci
      - if: ${{ steps.release.outputs.release_created }}
        run: npm run build
      - if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
