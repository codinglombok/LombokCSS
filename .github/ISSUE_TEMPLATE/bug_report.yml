name: Bug report
description: Something renders or behaves incorrectly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please fill in the details below.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, plus what you expected.
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal HTML/CSS, a CodePen, or steps to reproduce.
    validations: { required: true }
  - type: dropdown
    id: style
    attributes:
      label: Design style (data-style)
      options:
        - modern-corporate-flat
        - resonant-stark
        - neo-brutalism
        - semantic-minimalist
        - glassmorphism
        - not style-specific
    validations: { required: true }
  - type: input
    id: theme-dir
    attributes:
      label: Theme & direction
      placeholder: e.g. data-theme=dark, dir=rtl
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: e.g. Safari 17 / macOS 14
    validations: { required: true }
  - type: input
    id: version
    attributes:
      label: LombokCSS version
      placeholder: e.g. 0.1.0 (or CDN URL)
    validations: { required: true }
